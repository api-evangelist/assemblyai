naftiko: 1.0.0-alpha2
info:
  label: Mirror Gong calls into AssemblyAI for custom audio intelligence
  description: For each Gong call recording, pull the media URL and submit it to AssemblyAI so custom topic detection, sentiment, and LeMUR analysis can run alongside Gong's native pipeline.
  tags:
  - AssemblyAI
  - Integration
  - Revenue intelligence
  - gong
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ASSEMBLYAI_API_KEY: ASSEMBLYAI_API_KEY
    GONG_API_KEY: GONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: assemblyai
    baseUri: https://api.assemblyai.com
    description: AssemblyAI API operations consumed by this integration.
    resources:
    - name: v2-transcript
      path: /v2/transcript
      operations:
      - name: createtranscript
        method: POST
        description: Submit the Gong media URL to AssemblyAI.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lemur-v3-generate-task
      path: /lemur/v3/generate/task
      operations:
      - name: lemurtask
        method: POST
        description: Run a custom LeMUR prompt against the transcript.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: gong
    baseUri: https://api.gong.io
    description: Gong API operations consumed by this integration.
    resources:
    - name: v2-calls-extensive
      path: /v2/calls/extensive
      operations:
      - name: listcallsextensive
        method: POST
        description: 'Gong API: listCallsExtensive'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-calls-id
      path: /v2/calls/{id}
      operations:
      - name: getcall
        method: GET
        description: 'Gong API: getCall'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  exposes:
  - type: mcp
    namespace: assemblyai-gong-mcp
    description: MCP adapter for the assemblyai-gong integration.
    tools:
    - name: assemblyai_gong
      description: Execute the assemblyai gong integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: assemblyai-gong-rest
    port: 8080
    description: REST adapter for the assemblyai-gong integration.
    resources:
    - path: /assemblyai-gong
      name: assemblyai-gong
      description: REST surface for the assemblyai-gong integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the assemblyai-gong integration.
        call: assemblyai_gong
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
