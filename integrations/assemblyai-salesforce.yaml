naftiko: 1.0.0-alpha2
info:
  label: Log AssemblyAI call transcripts as Salesforce activities
  description: When AssemblyAI transcribes a sales call, create a Salesforce Task on the related Opportunity with the diarized transcript and LeMUR action items in the description.
  tags:
  - AssemblyAI
  - Integration
  - CRM
  - salesforce
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ASSEMBLYAI_API_KEY: ASSEMBLYAI_API_KEY
    SALESFORCE_API_KEY: SALESFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: assemblyai
    baseUri: https://api.assemblyai.com
    description: AssemblyAI API operations consumed by this integration.
    resources:
    - name: v2-transcript-transcript-id
      path: /v2/transcript/{transcript_id}
      operations:
      - name: gettranscript
        method: GET
        description: Fetch the completed transcript.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          description: Path parameter transcript_id.
          required: true
    - name: lemur-v3-generate-action-items
      path: /lemur/v3/generate/action-items
      operations:
      - name: lemuractionitems
        method: POST
        description: Extract follow-up action items via LeMUR.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: salesforce
    baseUri: https://yourinstance.my.salesforce.com
    description: Salesforce REST API operations consumed by this integration.
    resources:
    - name: services-data-v60-0-sobjects-task
      path: /services/data/v60.0/sobjects/Task
      operations:
      - name: createtask
        method: POST
        description: 'Salesforce REST API: createTask'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: services-data-v60-0-sobjects-task-id
      path: /services/data/v60.0/sobjects/Task/{id}
      operations:
      - name: updatetask
        method: PATCH
        description: 'Salesforce REST API: updateTask'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: assemblyai-salesforce-mcp
    description: MCP adapter for the assemblyai-salesforce integration.
    tools:
    - name: assemblyai_salesforce
      description: Execute the assemblyai salesforce integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: assemblyai-salesforce-rest
    port: 8080
    description: REST adapter for the assemblyai-salesforce integration.
    resources:
    - path: /assemblyai-salesforce
      name: assemblyai-salesforce
      description: REST surface for the assemblyai-salesforce integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the assemblyai-salesforce integration.
        call: assemblyai_salesforce
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
