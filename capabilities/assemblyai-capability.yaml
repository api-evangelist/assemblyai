naftiko: 1.0.0-alpha2
info:
  label: AssemblyAI API
  description: AssemblyAI API
  tags:
  - Assemblyai
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: assemblyai
    baseUri: https://api.assemblyai.com
    description: AssemblyAI API HTTP API.
    resources:
    - name: v2-upload
      path: /v2/upload
      operations:
      - name: uploadfile
        method: POST
        description: AssemblyAI Upload a media file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript
      path: /v2/transcript
      operations:
      - name: createtranscript
        method: POST
        description: AssemblyAI Transcribe audio
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listtranscripts
        method: GET
        description: AssemblyAI List transcripts
        inputParameters:
        - name: limit
          in: query
          type: string
          description: Maximum amount of transcripts to retrieve
        - name: status
          in: query
          type: string
          description: Filter by transcript status
        - name: created_on
          in: query
          type: string
          description: Only get transcripts created on this date
        - name: before_id
          in: query
          type: string
          description: Get transcripts that were created before this transcript ID
        - name: after_id
          in: query
          type: string
          description: Get transcripts that were created after this transcript ID
        - name: throttled_only
          in: query
          type: string
          description: Only get throttled transcripts, overrides the status filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id
      path: /v2/transcript/{transcript_id}
      operations:
      - name: gettranscript
        method: GET
        description: AssemblyAI Get transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletetranscript
        method: DELETE
        description: AssemblyAI Delete transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id-subtitle-format
      path: /v2/transcript/{transcript_id}/{subtitle_format}
      operations:
      - name: getsubtitles
        method: GET
        description: AssemblyAI Get subtitles for transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        - name: subtitle_format
          in: path
          type: string
          required: true
          description: The format of the captions
        - name: chars_per_caption
          in: query
          type: integer
          description: The maximum number of characters per caption
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id-sentences
      path: /v2/transcript/{transcript_id}/sentences
      operations:
      - name: gettranscriptsentences
        method: GET
        description: AssemblyAI Get sentences in transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id-paragraphs
      path: /v2/transcript/{transcript_id}/paragraphs
      operations:
      - name: gettranscriptparagraphs
        method: GET
        description: AssemblyAI Get paragraphs in transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id-word-search
      path: /v2/transcript/{transcript_id}/word-search
      operations:
      - name: wordsearch
        method: GET
        description: AssemblyAI Search words in transcript
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        - name: words
          in: query
          type: array
          required: true
          description: Keywords to search for
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-transcript-transcript-id-redacted-audio
      path: /v2/transcript/{transcript_id}/redacted-audio
      operations:
      - name: getredactedaudio
        method: GET
        description: AssemblyAI Get redacted audio
        inputParameters:
        - name: transcript_id
          in: path
          type: string
          required: true
          description: ID of the transcript
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-realtime-token
      path: /v2/realtime/token
      operations:
      - name: createtemporarytoken
        method: POST
        description: AssemblyAI Create temporary authentication token for Streaming STT
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lemur-v3-generate-task
      path: /lemur/v3/generate/task
      operations:
      - name: lemurtask
        method: POST
        description: AssemblyAI Run a task using LeMUR
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lemur-v3-generate-summary
      path: /lemur/v3/generate/summary
      operations:
      - name: lemursummary
        method: POST
        description: AssemblyAI Summarize a transcript using LeMUR
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lemur-v3-generate-question-answer
      path: /lemur/v3/generate/question-answer
