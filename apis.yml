  - type: Features
    data:
      - name: Speech-to-Text Transcription
        description: >-
          High-accuracy transcription of audio files and streams using
          AssemblyAI's Universal-2 model with support for 99+ languages and
          custom vocabulary.
      - name: Real-Time Streaming Transcription
        description: >-
          WebSocket-based streaming transcription for live audio with partial
          results and final transcripts, supporting call centers, live
          captioning, and voice applications.
      - name: Speaker Diarization
        description: >-
          Automatic speaker detection and labeling that identifies who said
          what in multi-speaker recordings.
      - name: Audio Intelligence
        description: >-
          Advanced understanding features including sentiment analysis,
          summarization, auto chapters, entity detection, content safety
          filtering, and PII redaction.
      - name: LeMUR
        description: >-
          LeMUR (Leveraging Large Language Models for Understanding Recordings)
          enables asking questions of audio transcripts using a conversational
          AI interface built on top of transcriptions.
  - type: UseCases
    data:
      - name: Call Center Analytics
        description: >-
          Customer service teams transcribe and analyze customer calls for
          quality assurance, compliance, agent coaching, and sentiment analysis.
      - name: Meeting Intelligence
        description: >-
          Enterprises transcribe virtual meetings (Zoom, Teams, Meet) to generate
          summaries, action items, and searchable archives.
      - name: Podcast Processing
        description: >-
          Podcast producers transcribe episodes for SEO, accessibility,
          show notes, and content repurposing.
      - name: Voice Application Development
        description: >-
          Developers build voice-powered applications using real-time streaming
          transcription for voice commands, dictation, and conversation interfaces.
      - name: Compliance and Legal
        description: >-
          Legal and compliance teams transcribe depositions, hearings, and
          recorded communications with PII redaction and timestamped transcripts.
  - type: Integrations
    data:
      - name: Twilio
        description: >-
          Integration with Twilio Media Streams for transcribing phone calls
          in real-time using AssemblyAI's streaming API.
      - name: Zoom
        description: >-
          Integration with Zoom recordings for batch transcription and
          meeting intelligence processing.
      - name: Python SDK
        description: >-
          Official Python SDK for AssemblyAI available on PyPI
          (assemblyai) for easy integration in Python applications.
      - name: Node.js SDK
        description: >-
          Official Node.js SDK for AssemblyAI available on npm
          (@assemblyai/sdk) for JavaScript and TypeScript applications.
