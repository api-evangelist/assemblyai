aid: assemblyai
name: AssemblyAI
description: >-
  Built by AI experts, AssemblyAI's Speech AI models include accurate
  speech-to-text for voice data (such as calls, virtual meetings, and podcasts),
  speaker detection, sentiment analysis, chapter detection, PII redaction, and
  more. AssemblyAI provides powerful APIs for transcribing and understanding
  audio data at scale. The platform supports real-time streaming transcription
  via WebSocket, asynchronous batch transcription, and audio intelligence
  features including summarization, auto chapters, entity detection, and
  content safety filtering. SDKs are available for Python, Node.js, Ruby,
  Java, and Go.
